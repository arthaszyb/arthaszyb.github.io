---
layout: default
---

<section class="hero-panel">
    <span class="hero-kicker">Page</span>
    <h1 class="hero-title">{% if page.title %}{{ page.title }}{% else %}{{ site.title }}{% endif %}</h1>
    <p class="hero-description">{{ page.description | default: site.description }}</p>
    <div class="hero-meta">
        <span>Curated and maintained on GitHub Pages</span>
        <span>{{ site.author }}</span>
    </div>
</section>

<section class="content-panel page-content">
    {{ content }}
</section>
